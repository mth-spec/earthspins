<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地球が何回回った日？</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #000000;
            color: #ffffff;
            text-align: center;
        }
        h1 { font-size: 2.5rem; margin-bottom: 20px; }
        /* 文字エリアを1つに絞り、読み上げやすく見えやすいデザインにしたのだ */
        p { font-size: 1.5rem; max-width: 600px; line-height: 1.6; font-weight: bold; color: #e3f9e3; }
    </style>
</head>
<body>

    <h1>地球が何回回った日？</h1>
    <p id="game-text" aria-live="polite">エンターキーかスペースキーを押すと、ずんだもんの音声案内が始まります。</p>

    <script>
        // --- ゲームの状態管理（ステート） ---
        let gameState = "WAIT_INITIAL_KEY"; // WAIT_INITIAL_KEY, INTRO, MODE_SELECT, PLAYING, ANSWER_SELECT
        let selectedMode = ""; 
        let currentEarthCount = 0; 
        let finalCorrectAnswer = 0; 
        let audioContext = null;
        let isAudioPlaying = false;
        
        let currentSource = null; 
        let gameLoopTimeout = null;

        // 音声認識（Web Speech API）の準備
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'ja-JP';
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;
        }

        // --- 音声ファイルの設定 ---
        const audioFiles = {
            title: "zundamon_title.wav",
            intro: "zundamon_intro.wav",
            sentaku: "zundamon_sentaku.wav",
            start: "zundamon_start.wav",
            kotaego: "zundamon_kotaego.wav",
            seikai: "zundamon_seikai.wav",
            hazure: "zundamon_hazure.wav",
            earth_normal: "earth_normal.wav",
            earth_fast: "earth_fast.wav",
            earth_slow: "earth_slow.wav",
            earth_accel: "earth_accel.wav",
            okyu_normal: "okyu_normal.wav",
            kettei: "kettei.mp3"
        };

        // --- キーボード入力の処理 ---
        window.addEventListener("keydown", (event) => {
            // 最初の待機状態のときだけキー入力を受け付けるのだ
            if (gameState === "WAIT_INITIAL_KEY") {
                if (event.key === "Enter" || event.key === " ") {
                    initAudio();
                    startIntroFlow(); // ①へ進むのだ
                }
            }
        });

        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // 音声再生関数（音が重ならない安全設計なのだ）
        function playAudio(url) {
            return new Promise((resolve, reject) => {
                isAudioPlaying = true;
                
                if (currentSource) {
                    try { currentSource.stop(); } catch(e) {}
                    currentSource = null;
                }

                fetch(url)
                    .then(response => response.arrayBuffer())
                    .then(arrayBuffer => audioContext.decodeAudioData(arrayBuffer))
                    .then(audioBuffer => {
                        // プレイ中以外に地球やおかゆの音が残ってたら再生を遮断するのだ
                        if (url.includes("earth") || url.includes("okyu")) {
                            if (gameState !== "PLAYING") {
                                isAudioPlaying = false;
                                resolve();
                                return;
                            }
                        }

                        const source = audioContext.createBufferSource();
                        source.buffer = audioBuffer;
                        source.connect(audioContext.destination);
                        
                        currentSource = source;

                        source.onended = () => {
                            isAudioPlaying = false;
                            if (currentSource === source) {
                                currentSource = null;
                            }
                            resolve();
                        };
                        source.start();
                    })
                    .catch(e => {
                        console.error("音声再生エラーなのだ:", e);
                        isAudioPlaying = false;
                        resolve(); 
                    });
            });
        }

        // PCの合成音声で正解の数値を読み上げる関数
        function speakText(text) {
            return new Promise((resolve) => {
                if (!window.speechSynthesis) {
                    resolve();
                    return;
                }
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = "ja-JP";
                utterance.rate = 1.0; 
                utterance.onend = () => {
                    resolve();
                };
                window.speechSynthesis.speak(utterance);
            });
        }

        // ①・② イントロの流れ
        async function startIntroFlow() {
            gameState = "INTRO";
            updateText("ずんだもんがお喋りしているのだ。耳をすませてね！");
            
            await playAudio(audioFiles.title); // ① タイトルの再生
            await playAudio(audioFiles.intro); // ② ルール説明の再生
            
            askModeSelection(); // ③へ自動進行！
        }

        // ③ 難易度選択（および ⑧の再選択）
        async function askModeSelection() {
            gameState = "MODE_SELECT";
            updateText("初級か中級、どっちにするか声で教えてね！");
            
            await playAudio(audioFiles.sentaku); // ③・⑧ 難易度を選ばせるボイス
            startVoiceRecognition(handleModeResult);
        }

        // ④・⑨ ゲームスタートから ⑤の本編再生
        async function startGamePlay() {
            gameState = "PLAYING";
            updateText("ゲームスタート！心の中で30秒を測るのだ！");
            
            await playAudio(audioFiles.start); // ④・⑨ スタートの合図ボイス
            
            currentEarthCount = 0;
            finalCorrectAnswer = 0;
            let hasRecorded30s = false;

            const startTime = audioContext.currentTime;
            const gameDuration = 50; // 50秒間流すなのだ

            async function playRandomLoop() {
                if (gameState !== "PLAYING") return;
                
                const elapsedTime = audioContext.currentTime - startTime;

                // 30秒経過した瞬間のカウントを正解としてキープするのだ
                if (elapsedTime >= 30 && !hasRecorded30s) {
                    finalCorrectAnswer = currentEarthCount;
                    hasRecorded30s = true;
                    console.log("【30秒通過】正解の数を固定したのだ：", finalCorrectAnswer);
                }

                // ⑤ 50秒が経過したら即座にストップして⑥へ行くのだ
                if (elapsedTime >= gameDuration) {
                    if (currentSource) {
                        try { currentSource.stop(); } catch(e) {}
                        currentSource = null;
                    }
                    endGamePlay();
                    return;
                }

                let nextFile = "";
                let isOkyu = false;

                // ⑤ 初級と中級のランダム条件分岐なのだ
                if (selectedMode === "中級" && Math.random() < 0.20) {
                    nextFile = audioFiles.okyu_normal; // 中級なら20%でお灸
                    isOkyu = true;
                } else {
                    const earthPool = [
                        audioFiles.earth_normal,
                        audioFiles.earth_fast,
                        audioFiles.earth_slow,
                        audioFiles.earth_accel
                    ];
                    nextFile = earthPool[Math.floor(Math.random() * earthPool.length)];
                }

                if (!isOkyu) {
                    currentEarthCount++; 
                }

                await playAudio(nextFile);
                
                const randomDelay = (Math.random() * 600) + 200;
                
                if (gameState === "PLAYING") {
                    gameLoopTimeout = setTimeout(playRandomLoop, randomDelay);
                }
            }

            playRandomLoop();
        }

        // ⑥ 50秒で止めて回答へ誘導
        async function endGamePlay() {
            clearTimeout(gameLoopTimeout);
            gameState = "ANSWER_SELECT";
            updateText("50秒経ったのだ！30秒の時の答えを言うのだ！");
            
            await playAudio(audioFiles.kotaego); // ⑥ 答えを促すボイス
            startVoiceRecognition(handleAnswerResult);
        }

        // ⑦ プレイヤーの回答の判定
        async function handleAnswerResult(transcript) {
            updateText(`あなたの答え: ${transcript}`);
            
            const spokenNumber = transcript.replace(/[^0-9]/g, '');
            
            await playAudio(audioFiles.kettei); // 決定音

            // ⑦ 正解・不正解の判定とボイス再生
            if (parseInt(spokenNumber) === finalCorrectAnswer) {
                updateText(`正解なのだ！ 30秒時点の答えは ${finalCorrectAnswer}回 でした！`);
                await playAudio(audioFiles.seikai); // 正解ボイス
            } else {
                updateText(`ハズレなのだ！ 正解は: ${finalCorrectAnswer}回`);
                await playAudio(audioFiles.hazure); // 不正解ボイス
                
                // 不正解のあとにPC音声で正解を読み上げるのだ
                await speakText("正解は、" + finalCorrectAnswer + "回でした。"); 
            }

            // ⑧・⑨ ループ処理！自動的に次の難易度選択（⑧）へ戻って繰り返すのだ
            askModeSelection();
        }

        // --- 音声認識（マイク入力）の共通制御 ---
        function startVoiceRecognition(callbackSuccess) {
            if (!recognition) {
                alert("このブラウザは音声認識に対応していないのだ。");
                return;
            }

            playBeep(440, 0.1); 
            try { recognition.start(); } catch(e) {}

            recognition.onresult = (event) => {
                const resultText = event.results[0][0].transcript;
                callbackSuccess(resultText);
            };

            recognition.onerror = (event) => {
                console.error("音声認識エラーなのだ:", event.error);
                if (gameState === "MODE_SELECT") {
                    askModeSelection();
                } else if (gameState === "ANSWER_SELECT") {
                    startVoiceRecognition(callbackSuccess);
                }
            };
        }

        // 難易度の声を聞き取ったら、余計なキー入力を挟まずにすぐ④・⑨のスタートへ直行するのだ！
        function handleModeResult(transcript) {
            if (transcript.includes("初級") || transcript.includes("しょきゅう")) {
                selectedMode = "初級";
                startGamePlay(); // 👈 ここで直接④・⑨の再生へジャンプ！
            } else if (transcript.includes("中級") || transcript.includes("ちゅうきゅう")) {
                selectedMode = "中級";
                startGamePlay(); // 👈 同上なのだ！
            } else {
                askModeSelection();
            }
        }

        function playBeep(freq, duration) {
            if (!audioContext) return;
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.type = "sine";
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.1, audioContext.currentTime);
            osc.connect(gain);
            gain.connect(audioContext.destination);
            osc.start();
            osc.stop(audioContext.currentTime + duration);
        }

        // 単一のテキストエリアのみを書き換える、安全な新関数なのだ
        function updateText(text) {
            document.getElementById("game-text").innerText = text;
        }
    </script>
</body>
</html>
