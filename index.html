<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地球が何回回った日？</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #000000;
            color: #ffffff;
            text-align: center;
        }
        h1 { font-size: 2.5rem; margin-bottom: 20px; }
        p { font-size: 1.5rem; max-width: 600px; line-height: 1.6; }
        .status { font-weight: bold; color: #e3f9e3; margin-top: 20px; }
    </style>
</head>
<body>

    <h1>地球が何回回った日？</h1>
    <p id="instruction">エンターキーかスペースキーを押すと、ずんだもんの音声案内が始まります。</p>
    <p id="game-status" class="status" aria-live="polite"></p>

    <script>
        // --- ゲームの状態管理（ステート） ---
        let gameState = "WAIT_INITIAL_KEY"; 
        let selectedMode = ""; 
        let currentEarthCount = 0; 
        let finalCorrectAnswer = 0; 
        let audioContext = null;
        let isAudioPlaying = false;
        
        // ★現在再生中の音源をコントロールするための大事な変数なのだ！
        let currentSource = null; 
        let gameLoopTimeout = null;

        // 音声認識（Web Speech API）の準備なのだ
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'ja-JP';
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;
        }

        // --- 音声ファイルの設定 ---
        const audioFiles = {
            title: "zundamon_title.wav",
            intro: "zundamon_intro.wav",
            sentaku: "zundamon_sentaku.wav",
            start: "zundamon_start.wav",
            kotaego: "zundamon_kotaego.wav",
            seikai: "zundamon_seikai.wav",
            hazure: "zundamon_hazure.wav",
            earth_normal: "earth_normal.wav",
            earth_fast: "earth_fast.wav",
            earth_slow: "earth_slow.wav",
            earth_accel: "earth_accel.wav",
            okyu_normal: "okyu_normal.wav",
            kettei: "kettei.mp3"
        };

        // --- キーボード入力の処理 ---
        window.addEventListener("keydown", (event) => {
            // 音声案内中や本編プレイ中は、キー入力を完全にガードして暴走を防ぐなのだ！
            if (isAudioPlaying || gameState === "PLAYING") return; 

            if (gameState === "WAIT_INITIAL_KEY") {
                if (event.key === "Enter" || event.key === " ") {
                    initAudio();
                    startIntroFlow();
                }
            } else if (gameState === "READY_TO_START") {
                if (event.key === " ") {
                    startGamePlay();
                }
            }
        });

        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // ★強化された音声再生関数（前の音が残っていたら強制ストップするのだ！）
        function playAudio(url) {
            return new Promise((resolve, reject) => {
                isAudioPlaying = true;
                
                // もし前に再生した音が残っていたら、ここで完全に消滅させるなのだ！
                if (currentSource) {
                    try { currentSource.stop(); } catch(e) {}
                    currentSource = null;
                }

                fetch(url)
                    .then(response => response.arrayBuffer())
                    .then(arrayBuffer => audioContext.decodeAudioData(arrayBuffer))
                    .then(audioBuffer => {
                        // 再生中にゲーム状態が変わってたら（50秒終了時など）再生しないのだ
                        if (url.includes("earth") || url.includes("okyu")) {
                            if (gameState !== "PLAYING") {
                                isAudioPlaying = false;
                                resolve();
                                return;
                            }
                        }

                        const source = audioContext.createBufferSource();
                        source.buffer = audioBuffer;
                        source.connect(audioContext.destination);
                        
                        currentSource = source; // 現在の音源としてキープ！

                        source.onended = () => {
                            isAudioPlaying = false;
                            if (currentSource === source) {
                                currentSource = null;
                            }
                            resolve();
                        };
                        source.start();
                    })
                    .catch(e => {
                        console.error("音声再生エラーなのだ:", e);
                        isAudioPlaying = false;
                        resolve(); 
                    });
            });
        }

        // ①・② イントロの流れ
        async function startIntroFlow() {
            gameState = "INTRO";
            updateStatus("ずんだもんがお喋りしているのだ。耳をすませてね！");
            
            await playAudio(audioFiles.title);
            await playAudio(audioFiles.intro);
            
            askModeSelection();
        }

        // ③ 難易度選択
        async function askModeSelection() {
            gameState = "MODE_SELECT";
            updateStatus("初級か中級、どっちにするか声で教えてね！");
            
            await playAudio(audioFiles.sentaku); 
            startVoiceRecognition(handleModeResult);
        }

        // ④ ゲームスタートの待機案内
        async function prepareForStart() {
            gameState = "READY_TO_START";
            updateStatus("スペースキーを押すとカウントダウンが始まるのだ！");
            
            await playAudio(audioFiles.kotaego); 
            isAudioPlaying = false; // 次のスペースキーを受け付けるためにフラグを強制解除するなのだ！
        }

        // ⑤ 本編（50秒間ランダム再生・30秒ロック）
        async function startGamePlay() {
            gameState = "PLAYING";
            updateStatus("ゲームスタート！心の中で30秒を測るのだ！");
            
            await playAudio(audioFiles.start); 
            
            currentEarthCount = 0;
            finalCorrectAnswer = 0;
            let hasRecorded30s = false;

            const startTime = audioContext.currentTime;
            const gameDuration = 50; 

            async function playRandomLoop() {
                if (gameState !== "PLAYING") return;
                
                const elapsedTime = audioContext.currentTime - startTime;

                // 30秒経過した瞬間のカウントを正解として固定
                if (elapsedTime >= 30 && !hasRecorded30s) {
                    finalCorrectAnswer = currentEarthCount;
                    hasRecorded30s = true;
                    console.log("【30秒通過】正解を固定したのだ：", finalCorrectAnswer);
                }

                // ★50秒が経過したら、即座にループを完全に断ち切るのだ！
                if (elapsedTime >= gameDuration) {
                    if (currentSource) {
                        try { currentSource.stop(); } catch(e) {}
                        currentSource = null;
                    }
                    endGamePlay();
                    return;
                }

                let nextFile = "";
                let isOkyu = false;

                if (selectedMode === "中級" && Math.random() < 0.20) {
                    nextFile = audioFiles.okyu_normal;
                    isOkyu = true;
                } else {
                    const earthPool = [
                        audioFiles.earth_normal,
                        audioFiles.earth_fast,
                        audioFiles.earth_slow,
                        audioFiles.earth_accel
                    ];
                    nextFile = earthPool[Math.floor(Math.random() * earthPool.length)];
                }

                if (!isOkyu) {
                    currentEarthCount++; 
                }

                await playAudio(nextFile);
                
                // 次の音が出るまでの無音の隙間
                const randomDelay = (Math.random() * 600) + 200;
                
                if (gameState === "PLAYING") {
                    gameLoopTimeout = setTimeout(playRandomLoop, randomDelay);
                }
            }

            playRandomLoop();
        }

        // ⑥ 50秒で音が停止、回答への誘導
        async function endGamePlay() {
            clearTimeout(gameLoopTimeout);
            gameState = "ANSWER_SELECT";
            updateStatus("50秒経ったのだ！30秒の時の答えを言うのだ！");
            
            await playAudio(audioFiles.kotaego);
            startVoiceRecognition(handleAnswerResult);
        }

        // ⑦ プレイヤーの回答の判定
        async function handleAnswerResult(transcript) {
            updateStatus(`あなたの答え: ${transcript}`);
            
            const spokenNumber = transcript.replace(/[^0-9]/g, '');
            
            await playAudio(audioFiles.kettei);

            if (parseInt(spokenNumber) === finalCorrectAnswer) {
                updateStatus(`正解なのだ！ 30秒時点の答えは ${finalCorrectAnswer}回 でした！`);
                await playAudio(audioFiles.seikai);
            } else {
                updateStatus(`ハズレなのだ！ 正解は: ${finalCorrectAnswer}回（50秒では${currentEarthCount}回）`);
                await playAudio(audioFiles.hazure);
            }

            // ⑧・⑨ 無限ループ処理で難易度選択へ戻る
            isAudioPlaying = false;
            askModeSelection();
        }

        // --- 音声認識（マイク入力）の共通制御 ---
        function startVoiceRecognition(callbackSuccess) {
            if (!recognition) {
                alert("このブラウザは音声認識に対応していないのだ。");
                return;
            }

            playBeep(440, 0.1); 
            try { recognition.start(); } catch(e) {}

            recognition.onresult = (event) => {
                const resultText = event.results[0][0].transcript;
                callbackSuccess(resultText);
            };

            recognition.onerror = (event) => {
                console.error("音声認識エラーなのだ:", event.error);
                if (gameState === "MODE_SELECT") {
                    askModeSelection();
                } else if (gameState === "ANSWER_SELECT") {
                    startVoiceRecognition(callbackSuccess);
                }
            };
        }

        function handleModeResult(transcript) {
            if (transcript.includes("初級") || transcript.includes("しょきゅう")) {
                selectedMode = "初級";
                prepareForStart();
            } else if (transcript.includes("中級") || transcript.includes("ちゅうきゅう")) {
                selectedMode = "中級";
                prepareForStart();
            } else {
                askModeSelection();
            }
        }

        function playBeep(freq, duration) {
            if (!audioContext) return;
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.type = "sine";
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.1, audioContext.currentTime);
            osc.connect(gain);
            gain.connect(audioContext.destination);
            osc.start();
            osc.stop(audioContext.currentTime + duration);
        }

        function updateStatus(text) {
            document.getElementById("game-status").innerText = text;
            document.getElementById("instruction").innerText = text;
        }
    </script>
</body>
</html>
