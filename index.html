<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地球が何回回った日？</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f8ff;
            color: #333;
            text-align: center;
        }
        h1 { font-size: 2.5rem; margin-bottom: 20px; }
        p { font-size: 1.5rem; max-width: 600px; line-height: 1.6; }
        .status { font-weight: bold; color: #ff4500; margin-top: 20px; }
    </style>
</head>
<body>

    <h1>地球が何回回った日？</h1>
    <p id="instruction">エンターキーかスペースキーを押すと、ずんだもんの音声案内が始まります。</p>
    <p id="game-status" class="status" aria-live="polite"></p>

    <script>
        // --- ゲームの状態管理（ステート） ---
        let gameState = "WAIT_INITIAL_KEY"; // 状態: WAIT_INITIAL_KEY, INTRO, MODE_SELECT, READY_TO_START, PLAYING, ANSWER_SELECT
        let selectedMode = ""; // "初級" または "中級"
        let currentEarthCount = 0; // リアルタイムに増えていくカウンター（50秒まで増え続ける）
        let finalCorrectAnswer = 0; // ★30.0秒時点の正解回数をロックして記憶する変数なのだ！
        let audioContext = null;
        let isAudioPlaying = false;

        // 音声認識（Web Speech API）の準備なのだ
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'ja-JP';
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;
        }

        // --- 音声ファイルの設定 ---
        // 確定した13個のファイル名リストなのだ！同じ階層に配置してね！
        const audioFiles = {
            title: "zundamon_title.wav",
            intro: "zundamon_intro.wav",
            sentaku: "zundamon_sentaku.wav",
            start: "zundamon_start.wav",
            kotaego: "zundamon_kotaego.wav",
            seikai: "zundamon_seikai.wav",
            hazure: "zundamon_hazure.wav",
            earth_normal: "earth_normal.wav",
            earth_fast: "earth_fast.wav",
            earth_slow: "earth_slow.wav",
            earth_accel: "earth_accel.wav",
            okyu_normal: "okyu_normal.wav",
            kettei: "kettei.mp3"
        };

        // --- キーボード入力の処理 ---
        window.addEventListener("keydown", (event) => {
            if (isAudioPlaying) return; // 音声案内中やカウントダウン中はキー入力をガードするなのだ！

            if (gameState === "WAIT_INITIAL_KEY") {
                if (event.key === "Enter" || event.key === " ") {
                    initAudio();
                    startIntroFlow();
                }
            } else if (gameState === "READY_TO_START") {
                if (event.key === " ") {
                    startGamePlay();
                }
            }
        });

        // AudioContextの初期化（ブラウザの安全ロックを解除するのだ）
        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // 音声ファイルを再生する共通の関数なのだ
        function playAudio(url) {
            return new Promise((resolve, reject) => {
                isAudioPlaying = true;
                fetch(url)
                    .then(response => response.arrayBuffer())
                    .then(arrayBuffer => audioContext.decodeAudioData(arrayBuffer))
                    .then(audioBuffer => {
                        const source = audioContext.createBufferSource();
                        source.buffer = audioBuffer;
                        source.connect(audioContext.destination);
                        source.onended = () => {
                            isAudioPlaying = false;
                            resolve();
                        };
                        source.start();
                    })
                    .catch(e => {
                        console.error("音声再生エラーなのだ:", e);
                        isAudioPlaying = false;
                        resolve(); // エラーが起きてもゲームの進行が止まらないようにする優しさ設計なのだ
                    });
            });
        }

        // ①・② イントロの流れ（タイトル ➔ ルール説明）
        async function startIntroFlow() {
            gameState = "INTRO";
            updateStatus("ずんだもんがお喋りしているのだ。耳をすませてね！");
            
            await playAudio(audioFiles.title);
            await playAudio(audioFiles.intro);
            
            askModeSelection();
        }

        // ③ 難易度選択（初級・中級）のアナウンスと音声認識
        async function askModeSelection() {
            gameState = "MODE_SELECT";
            updateStatus("初級か中級、どっちにするか声で教えてね！");
            
            await playAudio(audioFiles.sentaku); // 「初級か中級のどっちにするかを今言うのだ」
            startVoiceRecognition(handleModeResult);
        }

        // ④ ゲームスタートの待機案内
        async function prepareForStart() {
            gameState = "READY_TO_START";
            updateStatus("スペースキーを押すとカウントダウンが始まるのだ！");
            
            // この中に「準備ができたら、スペースキーを押すとカウントダウンが始まってゲームスタートなのだ！」が入っているのだね！
            await playAudio(audioFiles.kotaego); 
        }

        // ⑤ 本編（50秒間ランダムに流れ続けるが、30秒時点の数値を記憶！）
        async function startGamePlay() {
            gameState = "PLAYING";
            updateStatus("ゲームスタート！心の中で30秒を測るのだ！");
            
            await playAudio(audioFiles.start); // 「3、2、1、スタートなのだ！」
            
            currentEarthCount = 0;
            finalCorrectAnswer = 0;
            let hasRecorded30s = false;

            const startTime = audioContext.currentTime;
            const gameDuration = 50; // 全体の再生時間はたっぷり50秒間！

            // 50秒間、ランダムに音声を数珠つなぎにする再生ループなのだ
            async function playRandomLoop() {
                if (gameState !== "PLAYING") return;
                
                const elapsedTime = audioContext.currentTime - startTime;

                // ★【核心のロジック】ゲーム開始からきっちり30秒が経過した瞬間のカウントを正解としてロック！
                if (elapsedTime >= 30 && !hasRecorded30s) {
                    finalCorrectAnswer = currentEarthCount;
                    hasRecorded30s = true;
                    console.log("【システムログ】30秒経過！正解の回数を固定したのだ：", finalCorrectAnswer);
                }

                // 全体の50秒が経過したらストップして⑥へ移行するのだ
                if (elapsedTime >= gameDuration) {
                    endGamePlay();
                    return;
                }

                let nextFile = "";
                let isOkyu = false;

                // 中級モードなら20%の確率でお灸を混ぜるなのだ！
                if (selectedMode === "中級" && Math.random() < 0.20) {
                    nextFile = audioFiles.okyu_normal;
                    isOkyu = true;
                } else {
                    // 通常時、または初級なら地球の4つのバリエーションからランダムに選ぶなのだ
                    const earthPool = [
                        audioFiles.earth_normal,
                        audioFiles.earth_fast,
                        audioFiles.earth_slow,
                        audioFiles.earth_accel
                    ];
                    nextFile = earthPool[Math.floor(Math.random() * earthPool.length)];
                }

                // 正解カウンターの処理（お灸以外＝地球のときだけカウントアップ）
                if (!isOkyu) {
                    currentEarthCount++; 
                }

                // 音声を再生（再生が終わるまで次の音の計算を待つなのだ）
                await playAudio(nextFile);
                
                // 次の音が出るまでのランダムな無音の隙間（テンポをバラバラにする演出、0.2秒〜0.8秒の間）
                const randomDelay = (Math.random() * 600) + 200;
                setTimeout(playRandomLoop, randomDelay);
            }

            playRandomLoop();
        }

        // ⑥ 50秒経過して音が停止、回答への誘導
        async function endGamePlay() {
            gameState = "ANSWER_SELECT";
            updateStatus("50秒経ったのだ！30秒の時の答えを言うのだ！");
            
            // 誘導アナウンス（「30秒のときに言っていたのは地球が何回目だったのか、マイクに向かって答えを言うのだ！」）
            await playAudio(audioFiles.kotaego);
            startVoiceRecognition(handleAnswerResult);
        }

        // ⑦ プレイヤーの回答の判定
        async function handleAnswerResult(transcript) {
            updateStatus(`あなたの答え: ${transcript}`);
            
            // プレイヤーの音声から「数字」の部分だけを綺麗に抽出する裏ワザなのだ
            const spokenNumber = transcript.replace(/[^0-9]/g, '');
            
            // 判定の直前に、大前提ルールである「運命の決定音」を鳴らすのだ！
            await playAudio(audioFiles.kettei);

            // 50秒時点の数ではなく、裏でキープしておいた「30秒時点の正解（finalCorrectAnswer）」と比較！
            if (parseInt(spokenNumber) === finalCorrectAnswer) {
                updateStatus(`正解なのだ！ 30秒時点の答えは ${finalCorrectAnswer}回 でした！`);
                await playAudio(audioFiles.seikai);
            } else {
                updateStatus(`ハズレなのだ！ あなたの答え: ${spokenNumber}回 / 正解は: ${finalCorrectAnswer}回（50秒間では合計${currentEarthCount}回鳴っていたのだ）`);
                await playAudio(audioFiles.hazure);
            }

            // ⑧・⑨ 無限ループ処理！ゲームが終わったら自動的に「③の難易度選択」へ戻って繰り返し遊べるのだ！
            askModeSelection();
        }

        // --- 音声認識（マイク入力）の共通制御 ---
        function startVoiceRecognition(callbackSuccess) {
            if (!recognition) {
                alert("このブラウザは音声認識に対応していないのだ。Google Chromeなどを使ってね！");
                return;
            }

            // マイクがONになった瞬間の合図の「ピピッ」というSEの代わり（ブラウザの電子音）
            playBeep(440, 0.1); 

            recognition.start();

            recognition.onresult = (event) => {
                const resultText = event.results[0][0].transcript;
                callbackSuccess(resultText);
            };

            recognition.onerror = (event) => {
                console.error("音声認識エラーなのだ:", event.error);
                // 周りの雑音などで聞き取れなかった場合は、現在の状態に合わせて親切にリトライをかけるなのだ
                if (gameState === "MODE_SELECT") {
                    askModeSelection();
                } else if (gameState === "ANSWER_SELECT") {
                    startVoiceRecognition(callbackSuccess);
                }
            };
        }

        // 難易度選択で声を聞き取ったときの分岐処理なのだ
        function handleModeResult(transcript) {
            if (transcript.includes("初級") || transcript.includes("しょきゅう")) {
                selectedMode = "初級";
                prepareForStart();
            } else if (transcript.includes("中級") || transcript.includes("ちゅうきゅう")) {
                selectedMode = "中級";
                prepareForStart();
            } else {
                // 「高級」など違う言葉に聞こえちゃったら、もう一度優しく選択のアナウンスを流し直すなのだ
                askModeSelection();
            }
        }

        // マイクONの合図「ピピッ」を鳴らすための簡易音源システムなのだ
        function playBeep(freq, duration) {
            if (!audioContext) return;
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.type = "sine";
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.1, audioContext.currentTime);
            osc.connect(gain);
            gain.connect(audioContext.destination);
            osc.start();
            osc.stop(audioContext.currentTime + duration);
        }

        // 画面のテキストを更新して、目で見える人にも現在の状況をわかりやすくする関数なのだ
        function updateStatus(text) {
            document.getElementById("game-status").innerText = text;
            document.getElementById("instruction").innerText = text;
        }
    </script>
</body>
</html>
