<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地球が何回回った日？</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #000000;
            color: #ffffff;
            text-align: center;
        }
        h1 { font-size: 2.5rem; margin-bottom: 20px; }
        p { font-size: 1.5rem; max-width: 600px; line-height: 1.6; font-weight: bold; color: #e3f9e3; }
    </style>
</head>
<body>

    <h1>地球が何回回った日？</h1>
    <p id="game-text" aria-live="polite">エンターキーかスペースキーを押すと、ずんだもんの音声案内が始まります。</p>

    <script>
        // --- ゲームの状態管理 ---
        let gameState = "WAIT_INITIAL_KEY"; 
        let selectedMode = ""; 
        let currentEarthCount = 0; 
        let finalCorrectAnswer = 0; 
        let audioContext = null;
        let isAudioPlaying = false;
        
        let currentSource = null; 
        let gameLoopTimeout = null;

        // 音声認識（Web Speech API）の準備
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'ja-JP';
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;
        }

        // --- 音声ファイルの設定 ---
        const audioFiles = {
            title: "zundamon_title.wav",
            intro: "zundamon_intro.wav",
            sentaku: "zundamon_sentaku.wav",
            kotaego: "zundamon_kotaego.wav",
            seikai: "zundamon_seikai.wav",
            hazure: "zundamon_hazure.wav",
            earth_normal: "earth_normal.wav",
            earth_fast: "earth_fast.wav",
            earth_slow: "earth_slow.wav",
            earth_accel: "earth_accel.wav",
            okyu_normal: "okyu_normal.wav",
            kettei: "kettei.mp3"
        };

        // --- ① 最初のキー入力処理（重要：関数として独立させたのだ） ---
        function handleInitialKey(event) {
            if (gameState === "WAIT_INITIAL_KEY") {
                if (event.key === "Enter" || event.key === " ") {
                    event.preventDefault();
                    
                    // ★【超絶重要】キーが押された瞬間、このキーボード受付自体をこの世から完全に消し去るのだ！
                    // これにより、ブラウザによる2回目以降の「嘘の連打信号」は100%遮断され、タイトルが重複しなくなるのだ！
                    window.removeEventListener("keydown", handleInitialKey);
                    
                    gameState = "INTRO"; // 状態を一瞬で切り替えて二度と最初の画面に戻さないのだ
                    initAudio();
                    startIntroFlow(); // ①・②の流れへ
                }
            }
        }

        // 最初のキー入力を監視開始するのだ
        window.addEventListener("keydown", handleInitialKey);

        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // 音声再生関数
        function playAudio(url) {
            return new Promise((resolve, reject) => {
                isAudioPlaying = true;
                
                if (currentSource) {
                    try { currentSource.stop(); } catch(e) {}
                    currentSource = null;
                }

                fetch(url)
                    .then(response => response.arrayBuffer())
                    .then(arrayBuffer => audioContext.decodeAudioData(arrayBuffer))
                    .then(audioBuffer => {
                        if (url.includes("earth") || url.includes("okyu")) {
                            if (gameState !== "PLAYING") {
                                isAudioPlaying = false;
                                resolve();
                                return;
                            }
                        }

                        const source = audioContext.createBufferSource();
                        source.buffer = audioBuffer;
                        source.connect(audioContext.destination);
                        
                        currentSource = source;

                        source.onended = () => {
                            isAudioPlaying = false;
                            if (currentSource === source) {
                                currentSource = null;
                            }
                            resolve();
                        };
                        source.start();
                    })
                    .catch(e => {
                        console.error("音声再生エラー:", e);
                        isAudioPlaying = false;
                        resolve(); 
                    });
            });
        }

        // ①・② イントロ再生
        async function startIntroFlow() {
            updateText("ずんだもんがお喋りしているのだ。耳をすませてね！");
            
            await playAudio(audioFiles.title); // ① ここが絶対に2回重複しなくなるのだ！
            await playAudio(audioFiles.intro); // ②
            
            askModeSelection(); // ③へ自動進行
        }

        // ③・⑧ 難易度選択（何周しても必ずここを通るのだ）
        async function askModeSelection() {
            gameState = "MODE_SELECT";
            updateText("初級か中級、どっちにするか声で教えてね！");
            
            await playAudio(audioFiles.sentaku); // ③・⑧
            startVoiceRecognition(handleModeResult);
        }

        // ④・⑨ 声を聞き取ったら、PCの「ピ！」だけで即座にスタートなのだ！
        function triggerGameStart() {
            gameState = "PLAYING";
            updateText("ゲームスタート！心の中で30秒を測るのだ！");

            // 開始の合図音（ピッ！）
            playBeep(880, 0.15); 

            // 余計なボイスファイルを一切待たないので、完全に綺麗に本編（⑤）がスタートするのだ
            startGamePlay(); 
        }

        // ⑤ 本編再生（50秒間のランダムループ）
        function startGamePlay() {
            currentEarthCount = 0;
            finalCorrectAnswer = 0;
            let hasRecorded30s = false;

            const startTime = audioContext.currentTime;
            const gameDuration = 50; 

            async function playRandomLoop() {
                if (gameState !== "PLAYING") return;
                
                const elapsedTime = audioContext.currentTime - startTime;

                if (elapsedTime >= 30 && !hasRecorded30s) {
                    finalCorrectAnswer = currentEarthCount;
                    hasRecorded30s = true;
                    console.log("【30秒通過】正解を固定したのだ：", finalCorrectAnswer);
                }

                if (elapsedTime >= gameDuration) {
                    if (currentSource) {
                        try { currentSource.stop(); } catch(e) {}
                        currentSource = null;
                    }
                    endGamePlay(); // ⑥へ
                    return;
                }

                let nextFile = "";
                let isOkyu = false;

                // ⑤ 初級・中級の条件分岐
                if (selectedMode === "中級" && Math.random() < 0.20) {
                    nextFile = audioFiles.okyu_normal; 
                    isOkyu = true;
                } else {
                    const earthPool = [
                        audioFiles.earth_normal,
                        audioFiles.earth_fast,
                        audioFiles.earth_slow,
                        audioFiles.earth_accel
                    ];
                    nextFile = earthPool[Math.floor(Math.random() * earthPool.length)];
                }

                if (!isOkyu) {
                    currentEarthCount++; 
                }

                await playAudio(nextFile);
                
                const randomDelay = (Math.random() * 600) + 200;
                
                if (gameState === "PLAYING") {
                    gameLoopTimeout = setTimeout(playRandomLoop, randomDelay);
                }
            }

            playRandomLoop();
        }

        // ⑥ 50秒で止めて回答へ誘導
        async function endGamePlay() {
            clearTimeout(gameLoopTimeout);
            gameState = "ANSWER_SELECT";
            updateText("50秒経ったのだ！30秒の時の答えを言うのだ！");
            
            await playAudio(audioFiles.kotaego); // ⑥
            startVoiceRecognition(handleAnswerResult);
        }

        // ⑦ プレイヤーの回答の判定
        async function handleAnswerResult(transcript) {
            updateText(`あなたの答え: ${transcript}`);
            const spokenNumber = transcript.replace(/[^0-9]/g, '');
            
            await playAudio(audioFiles.kettei); 

            if (parseInt(spokenNumber) === finalCorrectAnswer) {
                updateText(`正解なのだ！ 30秒時点の答えは ${finalCorrectAnswer}回 でした！`);
                await playAudio(audioFiles.seikai); // ⑦ 正解ボイス
            } else {
                updateText(`ハズレなのだ！ 正解は: ${finalCorrectAnswer}回`);
                await playAudio(audioFiles.hazure); // ⑦ 不正解ボイス
            }

            // ⑧ 自動で次の周回の難易度選択へ完全ループなのだ！
            askModeSelection();
        }

        // --- 音声認識の制御 ---
        function startVoiceRecognition(callbackSuccess) {
            if (!recognition) {
                alert("このブラウザは音声認識に対応していないのだ。");
                return;
            }

            playBeep(440, 0.1); // マイクを開く合図の低い「ピ」
            try { recognition.start(); } catch(e) {}

            recognition.onresult = (event) => {
                const resultText = event.results[0][0].transcript;
                callbackSuccess(resultText);
            };

            recognition.onerror = (event) => {
                console.error("音声認識エラーなのだ:", event.error);
                if (gameState === "MODE_SELECT") {
                    askModeSelection();
                } else if (gameState === "ANSWER_SELECT") {
                    startVoiceRecognition(callbackSuccess);
                }
            };
        }

        function handleModeResult(transcript) {
            if (transcript.includes("初級") || transcript.includes("しょきゅう")) {
                selectedMode = "初級";
                triggerGameStart(); // ④・⑨ の機械音スタートへ直結
            } else if (transcript.includes("中級") || transcript.includes("ちゅうきゅう")) {
                selectedMode = "中級";
                triggerGameStart(); // 同上なのだ！
            } else {
                askModeSelection();
            }
        }

        // PCの機械音（合図音）を鳴らす関数
        function playBeep(freq, duration) {
            if (!audioContext) return;
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.type = "sine";
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.1, audioContext.currentTime);
            osc.connect(gain);
            gain.connect(audioContext.destination);
            osc.start();
            osc.stop(audioContext.currentTime + duration);
        }

        function updateText(text) {
            document.getElementById("game-text").innerText = text;
        }
    </script>
</body>
</html>
